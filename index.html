<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power Construction · Калькулятор КП</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sun:#F59E0B; --sun-lt:#FEF3C7; --sun-md:#FCD34D;
  --leaf:#16A34A; --leaf-lt:#DCFCE7; --leaf-md:#4ADE80;
  --sky:#0EA5E9;  --sky-lt:#E0F2FE; --sky-md:#38BDF8;
  --s2:#475569; --s3:#64748B; --s4:#94A3B8;
  --border:#E2E8F0; --border2:#CBD5E1;
  --bg:#F0F9FF; --bg2:#FFFFFF; --bg3:#F8FAFC;
  --text:#0F172A;
  --r:10px; --r2:14px; --r3:18px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
  --sh2:0 4px 24px rgba(14,165,233,.12);
}
html{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;color:var(--text);background:var(--bg);line-height:1.5}
input,select,textarea,button{font-family:inherit}
button{cursor:pointer;touch-action:manipulation}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── TOPBAR ── */
.topbar{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 28px;height:60px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:200;
  box-shadow:0 1px 0 var(--border),0 2px 8px rgba(0,0,0,.04);
}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{
  width:36px;height:36px;border-radius:9px;
  background:linear-gradient(135deg,var(--sun),#D97706);
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 2px 8px rgba(245,158,11,.3);
}
.logo-name{font-size:15px;font-weight:800;letter-spacing:.3px}
.logo-sub{font-size:11px;color:var(--s3);text-transform:uppercase;letter-spacing:.5px}
.topbar-right{display:flex;align-items:center;gap:10px}
.badge{
  padding:4px 12px;border-radius:20px;
  background:var(--leaf-lt);border:1px solid #BBF7D0;
  font-size:12px;color:var(--leaf);font-weight:600;
}
.btn-reset{
  padding:6px 16px;border-radius:8px;border:1px solid var(--border2);
  background:transparent;color:var(--s2);font-size:13px;font-weight:500;
  transition:all .15s;
}
.btn-reset:hover{background:var(--bg3)}

/* ── MAIN GRID ── */
.main{max-width:1320px;margin:0 auto;padding:28px 20px;display:grid;grid-template-columns:248px 1fr 460px;gap:24px}

/* ── SIDEBAR ── */
.sidebar{position:sticky;top:80px;height:fit-content;display:flex;flex-direction:column;gap:14px}
.nav-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh)}
.nav-step{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  border:none;background:transparent;width:100%;text-align:left;
  border-left:3px solid transparent;transition:all .15s;cursor:pointer;
}
.nav-step:hover{background:var(--bg3)}
.nav-step.active{background:var(--sky-lt);border-left-color:var(--sky)}
.nav-step.done{border-left-color:var(--leaf)}
.step-num{
  width:28px;height:28px;border-radius:7px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;font-family:'DM Mono',monospace;
  border:1.5px solid var(--border2);background:var(--bg3);color:var(--s3);
  transition:all .15s;
}
.nav-step.active .step-num{background:var(--sky-lt);border-color:var(--sky);color:var(--sky)}
.nav-step.done .step-num{background:var(--leaf-lt);border-color:var(--leaf-md);color:var(--leaf);font-size:14px}
.step-lbl{font-size:14px;font-weight:500;color:var(--s2)}
.nav-step.active .step-lbl{font-weight:700;color:var(--sky)}

.mini-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;box-shadow:var(--sh)}
.mini-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--s4);margin-bottom:12px}
.mini-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.mini-row:last-child{margin-bottom:0}
.mini-key{font-size:13px;color:var(--s3)}
.mini-val{font-size:15px;font-weight:700;color:var(--sky);font-family:'DM Mono',monospace}

/* ── FORM ── */
.form-area{display:flex;flex-direction:column;gap:6px}
.step-card{
  background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);
  overflow:hidden;box-shadow:var(--sh);transition:border-color .2s,box-shadow .2s;
}
.step-card.active{border-color:var(--sky-md);box-shadow:var(--sh2),0 0 0 3px rgba(14,165,233,.08)}
.step-header{
  padding:16px 20px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);cursor:pointer;
  background:linear-gradient(to right,var(--bg3),var(--bg2));
}
.step-card.active .step-header{background:linear-gradient(to right,var(--sky-lt),var(--bg2))}
.sh-left{display:flex;align-items:center;gap:10px}
.sh-icon{font-size:17px}
.sh-title{font-size:15px;font-weight:700;color:var(--text)}
.step-card:not(.active) .sh-title{color:var(--s2)}
.sh-prev{font-size:12px;color:var(--s3);font-family:'DM Mono',monospace;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.step-body{padding:22px;animation:fadeIn .22s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.step-nav{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.btn-prev{padding:9px 20px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--s2);font-size:14px;font-weight:500;transition:all .15s}
.btn-prev:hover{background:var(--bg3)}
.btn-next{padding:9px 22px;border-radius:8px;border:none;background:var(--sky);color:#fff;font-size:14px;font-weight:700;transition:all .15s;box-shadow:0 2px 8px rgba(14,165,233,.25)}
.btn-next:hover{background:#0284C7}

/* ── CONTROLS ── */
.fld{margin-bottom:16px}
.fld:last-child{margin-bottom:0}
.lbl{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--s3);margin-bottom:7px;display:block}
.inp{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r);
  background:var(--bg3);color:var(--text);font-size:15px;outline:none;
  transition:border-color .15s,box-shadow .15s;-webkit-appearance:none;appearance:none;
}
.inp:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(14,165,233,.12);background:#fff}
textarea.inp{resize:vertical;min-height:76px;line-height:1.5}

.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.type-card{
  padding:16px;border-radius:var(--r2);border:2px solid var(--border);
  background:var(--bg3);cursor:pointer;text-align:left;transition:all .15s;touch-action:manipulation;
}
.type-card:hover{border-color:var(--sky-md);background:var(--sky-lt)}
.type-card.act{border-color:var(--sky);background:var(--sky-lt);box-shadow:0 0 0 2px rgba(14,165,233,.1)}
.tc-icon{font-size:24px;margin-bottom:8px}
.tc-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px}
.type-card.act .tc-title{color:var(--sky)}
.tc-sub{font-size:12px;color:var(--s3)}

.radio-list{display:flex;flex-direction:column;gap:7px}
.radio-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;border-radius:var(--r);border:1.5px solid var(--border);
  background:var(--bg3);cursor:pointer;transition:all .15s;touch-action:manipulation;
}
.radio-item:hover{border-color:var(--sky-md);background:var(--sky-lt)}
.radio-item.act{border-color:var(--sky);background:var(--sky-lt)}
.rdot{
  width:17px;height:17px;border-radius:50%;border:2px solid var(--border2);
  flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center;
}
.radio-item.act .rdot{border-color:var(--sky);background:var(--sky)}
.rdot::after{content:'';width:7px;height:7px;border-radius:50%;background:#fff;opacity:0;transition:opacity .1s}
.radio-item.act .rdot::after{opacity:1}
.rlbl{font-size:14px;font-weight:500;color:var(--s2)}
.radio-item.act .rlbl{color:var(--sky);font-weight:600}
.rprice{font-size:13px;font-family:'DM Mono',monospace;color:var(--sun);font-weight:600}

.chk-row{
  display:flex;align-items:flex-start;gap:12px;padding:13px 15px;
  border-radius:var(--r);border:1.5px solid var(--border);background:var(--bg3);
  cursor:pointer;transition:all .15s;touch-action:manipulation;
}
.chk-row:hover{border-color:var(--sky-md);background:var(--sky-lt)}
.chk-row.chk{border-color:var(--sky);background:var(--sky-lt)}
.chkbox{
  width:19px;height:19px;border-radius:5px;border:2px solid var(--border2);flex-shrink:0;
  margin-top:2px;display:flex;align-items:center;justify-content:center;
  background:#fff;transition:all .15s;
}
.chk-row.chk .chkbox{background:var(--sky);border-color:var(--sky)}
.chkmark{display:none;color:#fff;font-size:11px;font-weight:900}
.chk-row.chk .chkmark{display:block}
.chk-title{font-size:14px;font-weight:600;color:var(--s2)}
.chk-row.chk .chk-title{color:var(--sky)}
.chk-sub{font-size:12px;color:var(--s3);margin-top:3px}

.info-box{
  padding:11px 15px;border-radius:var(--r);font-size:13px;
  display:flex;align-items:flex-start;gap:8px;margin-top:10px;
}
.info-sky{background:var(--sky-lt);border:1px solid #BAE6FD;color:#0369A1}
.info-sun{background:var(--sun-lt);border:1px solid #FDE68A;color:#92400E}
.info-leaf{background:var(--leaf-lt);border:1px solid #BBF7D0;color:#15803D}

.panel-info{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.pi-item{padding:10px 12px;border-radius:8px;background:var(--bg3);border:1px solid var(--border)}
.pi-key{font-size:11px;color:var(--s4);text-transform:uppercase;letter-spacing:.5px}
.pi-val{font-size:15px;font-weight:700;color:var(--sky);font-family:'DM Mono',monospace;margin-top:3px}

/* ── INV COUNT ── */
.inv-count-wrap{display:flex;align-items:center;gap:10px;margin-top:8px}
.icbtn{
  width:44px;height:44px;border-radius:9px;border:1.5px solid var(--border2);
  background:var(--bg3);color:var(--s2);font-size:20px;font-weight:700;
  display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;
}
.icbtn:hover{border-color:var(--sky);color:var(--sky);background:var(--sky-lt)}
.icval{
  flex:1;text-align:center;font-size:22px;font-weight:800;
  color:var(--text);font-family:'DM Mono',monospace;padding:6px;
  border:1.5px solid var(--border);border-radius:8px;background:var(--bg3);
}
.icauto{
  font-size:12px;color:var(--leaf);font-weight:700;cursor:pointer;
  padding:5px 12px;border-radius:7px;border:1px solid var(--leaf-md);
  background:var(--leaf-lt);flex-shrink:0;
}
.ac-total{
  margin-top:10px;padding:12px 16px;border-radius:var(--r);
  background:linear-gradient(135deg,var(--sun-lt),#FFF7ED);border:1px solid #FDE68A;
  display:flex;justify-content:space-between;align-items:center;
}
.ac-total-lbl{font-size:13px;color:#92400E}
.ac-total-val{font-size:18px;font-weight:800;color:var(--sun);font-family:'DM Mono',monospace}

/* ── RIGHT PANEL ── */
.result-panel{position:sticky;top:80px;align-self:start;max-height:calc(100vh - 100px);overflow-y:auto;padding-right:5px;display:flex;flex-direction:column;gap:16px}
.res-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh);flex-shrink:0}
.res-header{
  padding:20px 22px;
  background:linear-gradient(135deg,#F0F9FF,#E0F2FE);
  border-bottom:1px solid var(--border);
}
.res-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--s3);margin-bottom:6px}
.res-kw{font-size:38px;font-weight:800;color:var(--sky);font-family:'DM Mono',monospace;line-height:1}
.res-kw span{font-size:16px;font-weight:500;color:var(--s3)}
.res-sub{font-size:13px;color:var(--s3);margin-top:6px}

.equip-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 18px}
.eq-item{padding:13px 14px;border-radius:var(--r);background:var(--bg3);border:1px solid var(--border)}
.eq-lbl{font-size:11px;color:var(--s4);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.eq-val{font-size:15px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace}
.eq-sub{font-size:11px;color:var(--s3);margin-top:3px}
.eq-model{font-size:10px;color:var(--s4);margin-top:3px;font-style:italic;line-height:1.3;word-break:break-all}

.capex-wrap{padding:6px 20px 20px}
.capex-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--s4);margin-bottom:12px;margin-top:6px}
.capex-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.capex-lbl{font-size:13px;color:var(--s2);max-width:220px;line-height:1.3}
.capex-lbl.muted{color:var(--s4);text-decoration:line-through}
.capex-val{font-size:13px;font-family:'DM Mono',monospace;font-weight:600;color:var(--text);flex-shrink:0}
.capex-val.muted{color:var(--s4)}
.capex-div{height:1px;background:var(--border);margin:10px 0}
.tot-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.tot-lbl{font-size:13px;color:var(--s2)}
.tot-lbl.dim{color:var(--s4);font-size:12px}
.tot-val{font-size:13px;font-family:'DM Mono',monospace;font-weight:600;color:var(--text)}
.tot-val.dim{color:var(--s4);font-weight:400}
.tot-val.bold{font-size:14px;font-weight:800}
.total-box{
  margin:14px 0 0;padding:18px 20px;border-radius:var(--r2);
  background:linear-gradient(135deg,#0EA5E9,#0284C7);color:#fff;
}
.total-lbl{font-size:12px;letter-spacing:1px;text-transform:uppercase;opacity:.8;margin-bottom:6px}
.total-usd{font-size:32px;font-weight:800;font-family:'DM Mono',monospace;line-height:1.1}
.total-uah{font-size:14px;opacity:.75;margin-top:4px}
.total-kw{display:flex;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.2)}
.total-kw span{font-size:12px;opacity:.8}
.total-kw strong{font-family:'DM Mono',monospace;font-size:15px}

.btn-copy{
  width:100%;padding:13px;border-radius:var(--r2);
  border:1.5px solid var(--border);background:var(--bg2);
  color:var(--s2);font-size:14px;font-weight:600;transition:all .2s;
}
.btn-copy:hover,.btn-copy.copied{background:var(--leaf-lt);border-color:var(--leaf);color:var(--leaf)}
.btn-kp{
  width:100%;padding:16px;border-radius:var(--r2);border:none;
  background:linear-gradient(135deg,var(--leaf),#15803D);
  color:#fff;font-size:16px;font-weight:800;letter-spacing:.3px;
  box-shadow:0 4px 16px rgba(22,163,74,.3);transition:all .2s;
}
.btn-kp:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(22,163,74,.4)}

/* ── KP PAGE ── */
#kp-page{display:none;min-height:100vh;background:#F1F5F9}
.kp-toolbar{
  background:#fff;border-bottom:1px solid var(--border);padding:12px 28px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.btn-back{
  display:flex;align-items:center;gap:6px;padding:9px 18px;
  border-radius:8px;border:1px solid var(--border2);background:#fff;
  color:var(--s2);font-size:14px;font-weight:500;
}
.btn-back:hover{background:var(--bg3)}
.btn-print{
  padding:9px 22px;border-radius:8px;border:none;
  background:var(--sky);color:#fff;font-size:14px;font-weight:700;
}
.btn-print:hover{background:#0284C7}
.kp-doc{max-width:900px;margin:0 auto;padding:36px 20px 80px}

.kp-banner{
  background:linear-gradient(135deg,#0EA5E9 0%,#16A34A 100%);
  border-radius:var(--r3);padding:26px 32px;margin-bottom:24px;
  color:#fff;display:flex;justify-content:space-between;align-items:center;
}
.kp-bn{font-size:21px;font-weight:900;letter-spacing:1px;text-transform:uppercase}
.kp-bs{font-size:12px;opacity:.8;margin-top:4px}
.kp-br{text-align:right}
.kp-brl{font-size:11px;opacity:.7;text-transform:uppercase;letter-spacing:1px}
.kp-brd{font-family:'DM Mono',monospace;font-size:13px;margin-top:4px}

.kp-title-block{
  background:#fff;border-radius:var(--r2);padding:26px 30px;
  margin-bottom:22px;border:1px solid var(--border);box-shadow:var(--sh);
}
.kp-proj-lbl{font-size:11px;color:var(--s3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.kp-proj-name{font-size:20px;font-weight:800;color:var(--text);margin-bottom:8px}
.kp-proj-desc{font-size:13px;color:var(--s2);line-height:1.7}
.kp-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.kp-meta-item{padding:8px 14px;border-radius:9px;background:var(--bg3);border:1px solid var(--border)}
.kp-mk{font-size:10px;color:var(--s4);text-transform:uppercase;letter-spacing:.5px}
.kp-mv{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text)}

.kp-tbl-wrap{background:#fff;border-radius:var(--r2);overflow:hidden;border:1px solid var(--border);margin-bottom:22px;box-shadow:var(--sh)}
.kp-tbl-hdr{padding:14px 22px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.kp-tbl-title{font-size:14px;font-weight:800;color:var(--text)}
.kp-tbl-sub{font-size:12px;color:var(--s3)}
table.kt{width:100%;border-collapse:collapse;font-size:12px}
table.kt th{padding:9px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--s3);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);background:var(--bg3)}
table.kt th.r{text-align:right}
table.kt td{padding:9px 10px;border-bottom:1px solid #F8FAFC;color:var(--s2);vertical-align:middle}
table.kt td.r{text-align:right;font-family:'DM Mono',monospace}
table.kt tr:last-child td{border-bottom:none}
.tr-g td{background:#F0F9FF;font-size:11px;font-weight:800;color:#0284C7;text-transform:uppercase;letter-spacing:.4px;padding:7px 10px}
.tr-s td{background:var(--bg3);font-size:11px;color:var(--s3);font-style:italic;padding:6px 10px 6px 20px}
.tr-tot td{background:var(--bg3);font-weight:700;color:var(--text)}
.tr-dim td{background:var(--bg3);color:var(--s3);font-size:11px}
.tr-acc td{background:linear-gradient(135deg,#0EA5E9,#0284C7);color:#fff;font-weight:800}
.tr-kw td{background:#FFFBEB;color:#92400E;font-size:11px;font-style:italic}

.kp-notes{background:#FFFBEB;border:1px solid #FDE68A;border-radius:var(--r);padding:14px 18px;margin-bottom:20px;font-size:13px;color:#78350F}
.kp-footer{background:#fff;border-radius:var(--r2);padding:24px 28px;border:1px solid var(--border);font-size:12px;color:var(--s3);line-height:1.8}
.kp-footer p{margin-bottom:6px}
.kp-sign{margin-top:18px;color:var(--s2);font-size:14px;font-weight:600;line-height:1.8}
.kp-sign small{font-weight:400;color:var(--s3)}

.loader-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: var(--bg); z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.spinner {
  width: 44px; height: 44px; border: 4px solid var(--sky-lt);
  border-top-color: var(--sky); border-radius: 50%;
  animation: spin 1s linear infinite; margin-bottom: 20px;
}
.loader-text { font-size: 16px; font-weight: 700; color: var(--sky); letter-spacing: 0.5px; }
@keyframes spin { 100% { transform: rotate(360deg); } }

.result-panel::-webkit-scrollbar{width:4px;}
.result-panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.step-header:hover { background: linear-gradient(to right, var(--sky-lt), #F0F9FF); }

/* ── FOCUS / ERROR / VALIDATION ── */
.type-card:focus-visible,.radio-item:focus-visible,.chk-row:focus-visible{outline:2px solid var(--sky);outline-offset:2px}
.icbtn:focus-visible,.icauto:focus-visible{outline:2px solid var(--sky);outline-offset:2px}
.inp.error{border-color:#EF4444!important;box-shadow:0 0 0 3px rgba(239,68,68,.1)!important}
.fld-err{font-size:12px;color:#EF4444;margin-top:5px}

/* ── RESPONSIVE ── */
@media(max-width:1099px){
  .main{grid-template-columns:220px 1fr}
  .result-panel{grid-column:1/-1;position:static;max-height:none;overflow-y:visible}
}
@media(max-width:767px){
  .topbar{padding:0 16px;height:54px}
  .main{grid-template-columns:1fr;padding:14px 12px;gap:14px}
  .sidebar{position:static;height:auto}
  .nav-card{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .nav-step{flex-direction:column;align-items:center;gap:4px;padding:10px 8px;
    min-width:68px;text-align:center;border-left:none;border-bottom:3px solid transparent}
  .nav-step.active{border-left-color:transparent;border-bottom-color:var(--sky)}
  .nav-step.done{border-left-color:transparent;border-bottom-color:var(--leaf)}
  .step-lbl{font-size:10px;white-space:normal;line-height:1.2}
  .step-num{width:26px;height:26px;font-size:10px}
  .mini-card{display:none}
  .result-panel{position:static;max-height:none;overflow-y:visible}
  .btn-kp{position:sticky;bottom:16px;z-index:100;box-shadow:0 10px 30px rgba(22,163,74,.4)}
  .res-header{padding:16px 18px}
  .capex-wrap{padding:6px 14px 16px}
  /* KP page mobile */
  .kp-doc{padding:16px 12px 60px}
  .kp-banner{flex-direction:column;align-items:flex-start;gap:12px;padding:20px 22px}
  .kp-br{text-align:left}
  .kp-tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table.kt{min-width:620px}
  .kp-tbl-hdr{flex-direction:column;align-items:flex-start;gap:4px;padding:12px 16px}
  .kp-title-block{padding:20px 18px}
  .kp-footer{padding:18px 16px}
  .kp-toolbar{padding:10px 16px}
  .btn-print{padding:9px 16px;font-size:13px}
}

@page { size: A4 portrait; margin: 20mm; }
@media print{
  body, html { background: #fff; color: #000; font-size: 11pt; }
  .topbar,.kp-toolbar{display:none !important}
  #calc-page{display:none!important}
  #kp-page{display:block!important;background:#fff; min-height: auto;}
  .kp-doc{padding:0 !important; max-width: 100%; margin: 0; box-shadow: none; border: none;}
  .kp-banner { border-radius: 8px; margin-bottom: 20px; padding: 15px 20px; -webkit-print-color-adjust: exact; print-color-adjust: exact; color: #000 !important; background: #e0f2fe !important; border: 1px solid #bae6fd;}
  .kp-title-block, .kp-tbl-wrap, .kp-footer { box-shadow: none; border: 1px solid #ddd; }
  .kp-footer { page-break-inside: avoid; }
  table.kt th { background: #f1f5f9 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; color: #000 !important; }
  .tr-g td { background: #e0f2fe !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; color: #000 !important; }
  .tr-acc td { background: #e2e8f0 !important; color: #000 !important; font-weight: 800; -webkit-print-color-adjust: exact; print-color-adjust: exact; border-top: 2px solid #000;}
  .kp-bn, .kp-bs, .kp-brl, .kp-brd { color: #0f172a !important; }
  .tr-s td { color: #000 !important; background: #f8fafc !important; }
  .tr-tot td { color: #000 !important; }
  .tr-dim td { color: #333 !important; }
}
</style>

<body>
<div id="loader" class="loader-overlay"><div class="spinner"></div><div class="loader-text">Отримання актуальних цін з бази...</div></div>

<!-- ═══════════ CALC PAGE ═══════════ -->
<div id="calc-page">
<header class="topbar">
  <div class="logo">
    <div class="logo-icon">☀️</div>
    <div>
      <div class="logo-name">Power Construction LLC.</div>
      <div class="logo-sub">Solar EPC · Калькулятор КП</div>
    </div>
  </div>
  <div class="topbar-right">
    <span class="badge">🌿 Прайс Берез. 2025</span>
    <button class="btn-reset" onclick="resetForm()">Скинути</button>
  </div>
</header>

<div class="main">
  <!-- sidebar -->
  <aside class="sidebar">
    <div class="nav-card" id="nav-steps"></div>
    <div class="mini-card">
      <div class="mini-title">Поточний розрахунок</div>
      <div class="mini-row"><span class="mini-key">DC потужність</span><span class="mini-val" id="m-dc">—</span></div>
      <div class="mini-row"><span class="mini-key">AC інвертори</span><span class="mini-val" id="m-ac">—</span></div>
      <div class="mini-row"><span class="mini-key">Панелей</span><span class="mini-val" id="m-panels">—</span></div>
      <div class="mini-row"><span class="mini-key">Інверторів</span><span class="mini-val" id="m-inv">—</span></div>
    </div>
  </aside>

  <!-- form -->
  <div class="form-area" id="form-steps"></div>

  <!-- right panel -->
  <aside class="result-panel">
    <div class="res-card">
      <div class="res-header">
        <div class="res-label">Підібране обладнання</div>
        <div class="res-kw" id="r-kw">— <span>кВт DC</span></div>
        <div class="res-sub" id="r-sub">Введіть параметри</div>
      </div>
      <div class="equip-grid" id="equip-grid"></div>
      <div class="capex-wrap">
        <div class="capex-title">Розбивка CAPEX</div>
        <div id="capex-rows"></div>
        <div class="capex-div"></div>
        <div id="tot-rows"></div>
        <div class="total-box">
          <div class="total-lbl">Всього з ПДВ</div>
          <div class="total-usd" id="total-usd">—</div>
          <div class="total-uah" id="total-uah">—</div>
          <div class="total-kw">
            <span>Ціна за кВт (без ПДВ)</span>
            <strong id="price-kw">—</strong>
          </div>
        </div>
      </div>
    </div>
    <button class="btn-copy" id="btn-copy" onclick="copyResult()">📋 Копіювати підсумок</button>
    <button class="btn-kp" onclick="showKP()">📄 Сформувати комерційну пропозицію →</button>
  </aside>
</div>
</div>

<!-- ═══════════ KP PAGE ═══════════ -->
<div id="kp-page">
  <div class="kp-toolbar">
    <button class="btn-back" onclick="showCalc()">← Повернутись</button>
    <button class="btn-print" onclick="window.print()">🖨️ Друк / PDF</button>
  </div>
  <div class="kp-doc" id="kp-doc"></div>
</div>

<script>
// ═══════ ПРАЙС ═══════
let PANELS=[];
let H_INV={};
let G_INV={};
let MOUNT={
  flat_south:{label:"Плоский дах — Південь",price:0},
  flat_ew:{label:"Плоский дах — Схід-Захід",price:0},
  pitched:{label:"Скатна покрівля",price:0},
  ground:{label:"Наземна",price:0},
};
const ROOF=[
  {key:"flat_south",label:"Плоский дах — Південь",orient:"south"},
  {key:"flat_ew",label:"Плоский дах — Схід-Захід",orient:"ew"},
  {key:"pitched",label:"Скатна покрівля",orient:"south"},
];
const DC_AC={south:1.3,ew:1.6};
const STR=17, CABLE_K=1.5, AC_KW=35, GEN=0.10, VAT=0.20, KP_DAYS=10;
let CABLE_P = 0;
const STORE="solar_kp_v21";

// ═══════ STATE ═══════
const DEF={
  clientName:"",contactName:"",address:"",phone:"",email:"",notes:"",
  isGround:false,roofKey:"flat_south",
  powerMode:"dc",kwInput:400,
  invType:"hybrid",manualNom:null,manualCount:null,invWithUZE:false,
  hardwareNoVAT:false,
  panelModel:null,usdRate:44.5,
  step:0,
};
let S={...DEF};
try{const v=localStorage.getItem(STORE);if(v)S={...DEF,...JSON.parse(v)};}catch{}
function save(){try{localStorage.setItem(STORE,JSON.stringify(S));}catch{}}
function resetForm(){S={...DEF};save();buildUI();}

// ═══════ CALC ═══════
const f2=n=>n.toLocaleString("uk-UA",{minimumFractionDigits:2,maximumFractionDigits:2});
const usd=n=>`$${f2(n)}`;
const uah=(n,r)=>`${Math.round(n*r).toLocaleString("uk-UA")} грн`;
function kpDate(){const d=new Date();d.setDate(d.getDate()+KP_DAYS);return d.toLocaleDateString("uk-UA");}

function getWR(kw,ig){
  if(ig)return kw<500?75:55;
  if(kw<=100)return 75;if(kw<=500)return 55;return 50;
}
function nPanels(kwDC,pwr,ig){
  const raw=(kwDC*1000)/pwr;
  let n=Math.ceil(raw/STR)*STR;
  if(ig){if((n/STR)%2!==0)n+=STR;}
  else{if(n%2!==0)n+=STR;}
  return n;
}
function pickInv(acKw,maxNom,invMap){
  const line=Object.keys(invMap).map(Number).sort((a,b)=>a-b);
  const allowed=line.filter(n=>n<=maxNom);
  if(!allowed.length)return{nominal:0,count:0,totalAC:0,model:"—",price:0};
  const nom=allowed[allowed.length-1];
  const cnt=Math.floor(acKw/nom);
  return{nominal:nom,count:cnt,totalAC:cnt*nom,...invMap[nom]};
}

let C={};
function calcCapex(){
  const panel=PANELS.find(p=>p.model===S.panelModel)||PANELS[0];
  const orient=S.isGround?"south":(ROOF.find(r=>r.key===S.roofKey)?.orient||"south");
  const mkey=S.isGround?"ground":S.roofKey;
  const mount=MOUNT[mkey];
  const kwDC=S.powerMode==="ac"?S.kwInput*DC_AC[orient]:S.kwInput;
  const np=nPanels(kwDC,panel.power,S.isGround);
  const actKwDC=parseFloat(((np*panel.power)/1000).toFixed(2));
  const pUSD=panel.price*panel.power;
  const acKw=actKwDC/DC_AC[orient];
  const invMap=S.invType==="hybrid"?H_INV:G_INV;
  const maxNom=S.invType==="hybrid"?(actKwDC<500?75:100):130;

  let inv;
  if(S.manualNom&&invMap[S.manualNom]){
    const nom=S.manualNom;
    const autoCnt=Math.floor(acKw/nom);
    const cnt=S.manualCount!==null?S.manualCount:autoCnt;
    inv={nominal:nom,count:cnt,totalAC:cnt*nom,...invMap[nom]};
  } else {
    const ai=pickInv(acKw,maxNom,invMap);
    const cnt=S.manualCount!==null?S.manualCount:ai.count;
    inv={...ai,count:cnt,totalAC:cnt*ai.nominal};
  }

  const cableKm=parseFloat(((actKwDC/100)*(S.isGround?1.2:CABLE_K)).toFixed(2));
  const workRate=getWR(actKwDC,S.isGround);
  const panelCost=np*pUSD;
  const invCost=S.invWithUZE?0:inv.count*inv.price;
  const mountCost=np*mount.price;
  const cableCost=cableKm*CABLE_P;
  const acNetCost=S.invWithUZE?0:actKwDC*AC_KW;
  const workCost=actKwDC*workRate;
  const sesTotal=panelCost+invCost+mountCost+cableCost+acNetCost+workCost;
  const genCost=sesTotal*GEN;
  const sesNoVAT=sesTotal+genCost;
  const sesVAT=(S.hardwareNoVAT ? (mountCost+cableCost+acNetCost+workCost+genCost) : sesNoVAT)*VAT;
  const sesWithVAT=sesNoVAT+sesVAT;

  C={
    orient,mount,panel,pUSD,inv,
    np,strings:np/STR,actKwDC,kwDC,
    acNeeded:acKw.toFixed(1),acActual:inv.totalAC,
    cableKm,workRate,
    panelCost,invCost,mountCost,cableCost,acNetCost,workCost,
    sesTotal,genCost,sesNoVAT,sesVAT,sesWithVAT,
    pricePerKw:sesNoVAT/actKwDC,
    invTotalAC:inv.totalAC,
  };
}

function toggleHardwareVAT(){S.hardwareNoVAT=!S.hardwareNoVAT;calc();renderBody(4);}

function calc(){
  calcCapex();
  updateRight();
  updateMini();
  updatePreviews();
  updateInvDisp();
  save();
}

// ═══════ BUILD UI ═══════
const STEPS=[
  {icon:"👤",label:"Клієнт та об'єкт"},
  {icon:"🏗️",label:"Тип СЕС"},
  {icon:"⚡",label:"Потужність"},
  {icon:"🔌",label:"Інвертор"},
  {icon:"☀️",label:"Панелі та курс"},
];

function buildUI(){
  // nav
  document.getElementById("nav-steps").innerHTML=STEPS.map((st,i)=>`
    <button class="nav-step${S.step===i?" active":""}${i<S.step?" done":""}" onclick="goStep(${i})" aria-current="${S.step===i?'step':'false'}">
      <div class="step-num">${i<S.step?"✓":String(i+1).padStart(2,"0")}</div>
      <span class="step-lbl">${st.label}</span>
    </button>`).join("");

  // form cards
  document.getElementById("form-steps").innerHTML=STEPS.map((st,i)=>`
    <div class="step-card${S.step===i?" active":""}" id="sc-${i}">
      <div class="step-header" onclick="goStep(${i})">
        <div class="sh-left">
          <span class="sh-icon">${st.icon}</span>
          <span class="sh-title">${st.label}</span>
        </div>
        <span class="sh-prev" id="prev-${i}"></span>
      </div>
      <div class="step-body" id="body-${i}" style="display:${S.step===i?"block":"none"}"></div>
    </div>`).join("");

  STEPS.forEach((_,i)=>renderBody(i));
  calc();
}

function renderBody(i){
  const el=document.getElementById(`body-${i}`);
  if(!el)return;
  el.innerHTML=stepHTML(i);
  bindEvents(i);
  applyARIA(i);
}

function applyARIA(i){
  const body=document.getElementById(`body-${i}`);
  if(!body)return;
  body.querySelectorAll('.type-card').forEach(el=>{
    el.setAttribute('role','radio');
    el.setAttribute('aria-checked',el.classList.contains('act')?'true':'false');
    el.setAttribute('tabindex','0');
    el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();el.click();}});
  });
  body.querySelectorAll('.radio-item').forEach(el=>{
    el.setAttribute('role','radio');
    el.setAttribute('aria-checked',el.classList.contains('act')?'true':'false');
    el.setAttribute('tabindex','0');
    el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();el.click();}});
  });
  body.querySelectorAll('.chk-row').forEach(el=>{
    el.setAttribute('role','checkbox');
    el.setAttribute('aria-checked',el.classList.contains('chk')?'true':'false');
    el.setAttribute('tabindex','0');
    el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();el.click();}});
  });
}

function stepHTML(i){
  if(i===0) return `
    <div class="fld"><label class="lbl">Назва клієнта / об'єкту</label>
      <input class="inp" id="in-client" value="${esc(S.clientName)}" placeholder="ТОВ «Ромашка» / АЗС UPG"></div>
    <div class="fld"><label class="lbl">Адреса об'єкту</label>
      <input class="inp" id="in-addr" value="${esc(S.address)}" placeholder="м. Київ, вул. Хрещатик, 1"></div>
    <div class="fld"><label class="lbl">Контактна особа (ім'я)</label>
      <input class="inp" id="in-contact" value="${esc(S.contactName)}" placeholder="Іван Петренко"></div>
    <div class="fld"><label class="lbl">Телефон</label>
      <input class="inp" id="in-phone" value="${esc(S.phone)}" placeholder="+380 50 000 00 00" type="tel"></div>
    <div class="fld"><label class="lbl">Email</label>
      <input class="inp" id="in-email" value="${esc(S.email)}" placeholder="client@example.com" type="email"></div>
    <div class="fld"><label class="lbl">Примітки до КП</label>
      <textarea class="inp" id="in-notes" placeholder="Особливі умови, побажання клієнта...">${esc(S.notes)}</textarea></div>
    <div class="step-nav"><button class="btn-next" onclick="goStep(1)">Далі →</button></div>`;

  if(i===1){
    const rHTML=ROOF.map(rt=>`
      <div class="radio-item${S.roofKey===rt.key?" act":""}" onclick="setRoof('${rt.key}')">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="rdot"></div><span class="rlbl">${rt.label}</span>
        </div>
        <span class="rprice">$${MOUNT[rt.key].price}/шт</span>
      </div>`).join("");
    return `
      <div class="type-grid">
        <div class="type-card${!S.isGround?" act":""}" onclick="setGround(false)">
          <div class="tc-icon">🏠</div><div class="tc-title">Дахова</div><div class="tc-sub">Монтаж на покрівлі</div>
        </div>
        <div class="type-card${S.isGround?" act":""}" onclick="setGround(true)">
          <div class="tc-icon">🌿</div><div class="tc-title">Наземна</div><div class="tc-sub">Відкрита площадка</div>
        </div>
      </div>
      ${!S.isGround
        ?`<div class="fld"><label class="lbl">Тип покрівлі</label><div class="radio-list">${rHTML}</div></div>`
        :`<div class="info-box info-leaf">🏗️ Оцинкована конструкція · <strong>$${MOUNT.ground.price}/шт</strong> · парна кількість стрінгів</div>`}
      <div class="step-nav">
        <button class="btn-prev" onclick="goStep(0)">← Назад</button>
        <button class="btn-next" onclick="goStep(2)">Далі →</button>
      </div>`;
  }

  if(i===2){
    const dcHint=S.powerMode==="ac"
      ?`<div class="info-box info-sky">DC = ${S.kwInput} × ${DC_AC[C.orient||"south"]} = <strong>${(S.kwInput*DC_AC[C.orient||"south"]).toFixed(1)} кВт DC</strong></div>`:"";
    return `
      <div class="type-grid">
        <div class="type-card${S.powerMode==="dc"?" act":""}" onclick="setPM('dc')">
          <div class="tc-icon">⚡</div><div class="tc-title">По панелях</div><div class="tc-sub">Вводимо кВт DC</div>
        </div>
        <div class="type-card${S.powerMode==="ac"?" act":""}" onclick="setPM('ac')">
          <div class="tc-icon">🔌</div><div class="tc-title">По вводу AC</div><div class="tc-sub">Потужність підключення</div>
        </div>
      </div>
      <div class="fld"><label class="lbl">${S.powerMode==="dc"?"Потужність панелей, кВт DC":"Потужність вводу AC, кВт"}</label>
        <input class="inp" type="number" id="in-kw" value="${S.kwInput}" min="1">
      </div>
      ${dcHint}
      <div class="step-nav">
        <button class="btn-prev" onclick="goStep(1)">← Назад</button>
        <button class="btn-next" onclick="validateAndGoStep(3)">Далі →</button>
      </div>`;
  }

  if(i===3){
    const imap=S.invType==="hybrid"?H_INV:G_INV;
    const opts=Object.keys(imap).map(n=>`<option value="${n}"${S.manualNom==n?" selected":""}>${n} кВт · ${imap[n].model} · $${imap[n].price.toLocaleString()}</option>`).join("");
    const disp=S.manualCount!==null?S.manualCount:(C.inv?.count||0);
    return `
      <div class="type-grid">
        <div class="type-card${S.invType==="hybrid"?" act":""}" onclick="setInvType('hybrid')">
          <div class="tc-icon">🔋</div><div class="tc-title">Гібридний</div><div class="tc-sub">DEYE HV</div>
        </div>
        <div class="type-card${S.invType==="grid"?" act":""}" onclick="setInvType('grid')">
          <div class="tc-icon">📡</div><div class="tc-title">Мережевий</div><div class="tc-sub">DEYE Grid</div>
        </div>
      </div>
      <div class="fld"><label class="lbl">Потужність одного інвертора</label>
        <select class="inp" id="in-inv-nom">
          <option value="">⚡ Авто (підібрати)</option>${opts}
        </select>
      </div>
      <div class="fld">
        <label class="lbl">Кількість інверторів</label>
        <div class="inv-count-wrap">
          <button class="icbtn" onclick="chgInv(-1)">−</button>
          <input class="icval" type="number" id="in-inv-cnt" value="${disp}" min="1" max="50" oninput="setInvCnt(parseInt(this.value)||1)">
          <button class="icbtn" onclick="chgInv(1)">+</button>
          <button class="icauto" onclick="resetInv()">Авто</button>
        </div>
        <div class="ac-total" style="margin-top:10px">
          <span class="ac-total-lbl">Сумарна потужність AC</span>
          <span class="ac-total-val" id="ac-total-disp">${C.inv?.totalAC||0} кВт</span>
        </div>
      </div>
      <div class="fld" onclick="toggleWithUZE()">
        <div class="chk-row${S.invWithUZE?" chk":""}">
          <div class="chkbox"><span class="chkmark">✓</span></div>
          <div>
            <div class="chk-title">Інвертор постачається разом з накопичувачем</div>
            <div class="chk-sub">Не включати вартість інвертора та мереж AC до КП</div>
          </div>
        </div>
      </div>
      ${S.invWithUZE?`<div class="info-box info-sun">⚠️ Інвертор та мережі AC виключені з розрахунку</div>`:""}
      <div class="step-nav">
        <button class="btn-prev" onclick="goStep(2)">← Назад</button>
        <button class="btn-next" onclick="goStep(4)">Далі →</button>
      </div>`;
  }

  if(i===4){
    const p=PANELS.find(x=>x.model===S.panelModel)||PANELS[0];

function esc(s){return String(s||"").replace(/"/g,"&quot;").replace(/[<]/g,"&lt;");}

function bindEvents(i){
  const $ =id=>document.getElementById(id);
  const on=(id,ev,fn)=>{const e=$(id);if(e)e.addEventListener(ev,fn);};
  if(i===0){
    on("in-client","input",e=>{S.clientName=e.target.value;save();updatePreviews();});
    on("in-addr","input",e=>{S.address=e.target.value;save();updatePreviews();});
    on("in-contact","input",e=>{S.contactName=e.target.value;save();});
    on("in-phone","input",e=>{S.phone=e.target.value;save();});
    on("in-email","input",e=>{S.email=e.target.value;save();});
    on("in-notes","input",e=>{S.notes=e.target.value;save();});
  }
  if(i===2){
    on("in-kw","input",e=>{
      S.kwInput=Math.max(1,+e.target.value||1);S.manualCount=null;calc();
      e.target.classList.remove("error");
      const err=document.getElementById("kw-err");if(err)err.remove();
    });
  }
  if(i===3){
    on("in-inv-nom","change",e=>{S.manualNom=e.target.value?+e.target.value:null;S.manualCount=null;calc();renderBody(3);});
    on("in-inv-cnt","input",e=>{const v=parseInt(e.target.value);if(v>0){S.manualCount=v;calc();updateInvDisp();}});
  }
  if(i===4){
    on("in-panel","change",e=>{S.panelModel=e.target.value;S.manualCount=null;calc();renderBody(4);});
    on("in-rate","input",e=>{S.usdRate=Math.max(1,+e.target.value||1);calc();});
  }
}

function validateAndGoStep(to){
  if(S.step===2){
    const el=document.getElementById("in-kw");
    if(el){
      const v=parseFloat(el.value);
      if(!v||v<=0){
        el.classList.add("error");
        if(!document.getElementById("kw-err")){
          const d=document.createElement("div");
          d.id="kw-err";d.className="fld-err";
          d.textContent="Введіть потужність більше 0";
          el.parentNode.appendChild(d);
        }
        el.focus();return;
      }
    }
  }
  goStep(to);
}

function goStep(n){
  saveInputs();
  S.step=n;save();
  document.querySelectorAll(".step-card").forEach((el,i)=>{
    el.classList.toggle("active",i===n);
    document.getElementById(`body-${i}`).style.display=i===n?"block":"none";
  });
  document.querySelectorAll(".nav-step").forEach((el,i)=>{
    el.className="nav-step"+(i===n?" active":i<n?" done":"");
    el.setAttribute("aria-current",i===n?"step":"false");
    el.querySelector(".step-num").textContent=i<n?"✓":String(i+1).padStart(2,"0");
  });
  if(n===3)renderBody(3);
  if(n===4)renderBody(4);
}

function saveInputs(){
  const $=id=>document.getElementById(id);

function parseCSV(text) {
  let rows = [];
  let cols = [];
  let c = "";
  let q = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (q && text[i + 1] === '"') { c += '"'; i++; } else q = !q;
    } else if (ch === ',' && !q) {
      cols.push(c); c = "";
    } else if ((ch === '\n' || ch === '\r') && !q) {
      if (ch === '\r' && text[i+1] === '\n') i++;
      cols.push(c.trim());
      rows.push(cols);
      cols = [];
      c = "";
    } else {
      c += ch;
    }
  }
  cols.push(c.trim());
  if (cols.length > 1 || c !== "") rows.push(cols);
  return rows;
}

function parsePrice(s){
  if(!s)return 0;
  const m=s.replace(',','.').match(/[\d.]+/);
  return m?parseFloat(m[0]):0;
}

async function fetchCSV(g){
  const res=await fetch(B_URL+g);
  if(!res.ok)throw new Error("NetErr");
  const t=await res.text();
  const lastModified=res.headers.get('Last-Modified')||res.headers.get('date')||null;
  return {rows:parseCSV(t), lastModified};
}

async function initApp() {
  try {
    const [pRes, mRes, gRes, hRes, cRes] = await Promise.all([
      fetchCSV(GIDS.panels), fetchCSV(GIDS.mounts), fetchCSV(GIDS.gridInv), fetchCSV(GIDS.hybridInv), fetchCSV(GIDS.cable)
    ]);
    const [pCSV, mCSV, gCSV, hCSV, cCSV] = [pRes.rows, mRes.rows, gRes.rows, hRes.rows, cRes.rows];

    // Оновлення бейджа дати прайсу
    const _lm = pRes.lastModified;
    if(_lm){
      const _d=new Date(_lm);
      if(!isNaN(_d)){
        const _mn=['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];
        document.querySelector('.badge').textContent=`🌿 Прайс ${_mn[_d.getMonth()]}. ${_d.getFullYear()}`;
      }
    }
    
    PANELS=[];
    for(const r of pCSV){
      if(r.length>=5){
        const model=r[0]?(r[0].trim()):"", desc=r[1]?(r[1].trim()):"", avail=r[2]?(r[2].trim()):"", priceStr=r[4];
        const effectiveModel=model||(desc?desc.replace(/^Сонячна панель\s*/i,"").split(/\s+/).slice(0,2).join(" "):"");
        if(effectiveModel&&desc&&priceStr&&!effectiveModel.includes("Модель")&&!desc.includes("Короткий опис")){
           const price = parsePrice(priceStr);
           const powMatch=desc.match(/(\d+)\s*(В|W|Вт)/i)
             ||(model?model.match(/(\d+)\s*(В|W|Вт)/i):null)
             ||desc.match(/[-](\d{3,4})[NnWMm]/i)
             ||(model?model.match(/[-](\d{3,4})[NnWMm]/i):null);
           const pow=powMatch?parseInt(powMatch[1]):0;
           if(pow>0 && price>0) PANELS.push({model:effectiveModel, label:desc.split(' ').slice(0,6).join(' '), power:pow, price, avail});
        }
      }
    }

    const parseI = (csv, map) => {
      for(const r of csv){
        if(r.length>=5){
          const model=(r[0]?r[0].trim():"")||(r[1]?r[1].trim():"");
          const desc=r[1]?(r[1].trim()):"", priceStr=r[4];
          if(model&&priceStr&&!model.includes("Модель")&&!model.includes("Короткий")){
            const price = parsePrice(priceStr);
            const kwMatch=model.match(/(\d+)K/i)||desc.match(/(\d+)\s*[kк][WВ]/i);
            const nom=kwMatch?parseInt(kwMatch[1]):0;
            if(nom>0 && price>0) map[nom]={model:model, price:price};
          }
        }
      }
    };
    H_INV={}; G_INV={};
    parseI(hCSV, H_INV); parseI(gCSV, G_INV);

    for(const r of cCSV){
      const model=(r[0]||"").trim().toLowerCase();
      const desc=(r[1]||"").trim();
      const priceStr=r[4];
      const isCable=model.includes("кабель")||desc.includes("6мм")||desc.includes("1*6");
      if(isCable&&priceStr){
        const p=parsePrice(priceStr);
        if(p>0){
          const rollMatch=desc.match(/(\d{3,})\s*м/);
          const rollM=rollMatch?parseInt(rollMatch[1]):1;
          CABLE_P=rollM>1?(p/rollM*1000):(p*1000);
        }
      }
    }

    for(const r of mCSV){
      const model=(r[0]||"").trim().toLowerCase(), priceStr=r[4];
      if(model&&priceStr){
        const p=parsePrice(priceStr);
        if(p>0){
          if(model.includes("південь")) MOUNT.flat_south.price=p;
          else if(model.includes("захід")) MOUNT.flat_ew.price=p;
          else if(model.includes("скатн")||model.includes("металопрофіль")) MOUNT.pitched.price=p;
          else if(model.includes("наземн")) MOUNT.ground.price=p;
        }
      }
    }

    localStorage.setItem("skp_cache_v22", JSON.stringify({PANELS, H_INV, G_INV, MOUNT, CABLE_P}));
  } catch(e) {
    console.warn("Google Sheets error, using cache", e);
    const badgeEl=document.querySelector('.badge');
    if(badgeEl) badgeEl.textContent='⚠️ Прайс не завантажено!';
    const cStr=localStorage.getItem("skp_cache_v22");
    if(cStr){
       try {
         const c=JSON.parse(cStr);
         if(c.PANELS&&c.PANELS.length)PANELS=c.PANELS; 
         if(c.H_INV)H_INV=c.H_INV; 
         if(c.G_INV)G_INV=c.G_INV;
         if(c.MOUNT)MOUNT=c.MOUNT; 
         if(c.CABLE_P)CABLE_P=c.CABLE_P;
       } catch(ex){}
    }
  }

  // Fallback defaults
  if(PANELS.length===0) PANELS.push({model:"Unknown", label:"Дані не завантажено", power:500, price:0.15, avail:"-"});
  if(Object.keys(H_INV).length===0) H_INV[10] = {model:"Unknown", price:1000};
  if(Object.keys(G_INV).length===0) G_INV[10] = {model:"Unknown", price:800};

  if(!S.panelModel && PANELS.length) S.panelModel=PANELS[0].model;
  
  const loaderEl = document.getElementById("loader"); 
  if(loaderEl) loaderEl.style.display="none";
  
  buildUI();
}

window.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
